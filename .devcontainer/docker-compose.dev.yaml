services:
  dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      target: development
    container_name: pesv_dev
    depends_on:
      database:
        condition: service_healthy
    working_dir: /workspace
    tty: true
    stdin_open: true
    volumes:
      - ..:/workspace:cached
      - node_modules:/workspace/node_modules
      - be_files:/app/uploads:Z
    ports:
      - "3100:3100"   # API
      - "3000:3000"   # Frontend
      - "9229:9229"   # API debugger
      - "9230:9230"   # Client debugger
    environment:
      NODE_ENV: "development"
      WATCHPACK_POLLING: "true"
      PESV_UPLOADS_DIR: "/app/uploads"
    env_file:
      - ../.env
    networks:
      - pesv_dev_network
    command: ["sleep", "infinity"]

  database:
    image: mysql:8.0
    container_name: autobuses_db_dev
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-pesv_dev_db}"
      MYSQL_USER: "${MYSQL_USER:-devuser}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-devsecret}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-rootsecret}"
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u \"$MYSQL_USER\" -p\"$MYSQL_PASSWORD\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pesv_dev_network

volumes:
  db_data_dev:
  node_modules:
  be_files:

networks:
  pesv_dev_network:
    driver: bridge
