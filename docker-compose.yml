
services:
  db-lms:
    image: mysql:8.0
    container_name: lms-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lms_db
      MYSQL_USER: lms_user
      MYSQL_PASSWORD: lms_password
    ports:
      - "127.0.0.1:3307:3306" # Bind to localhost only — never expose DB to the network
    volumes:
      - lms-db-data:/var/lib/mysql

volumes:
  lms-db-data:
