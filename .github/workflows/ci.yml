name: CI — LMS Platform

on:
  push:
    branches: [main, develop, fix/remediation]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend (API) ──────────────────────────────────
  api-test:
    name: API — Lint, Types, Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api exec prisma generate

      # F7.1: Lint without --fix (fails on violations instead of silently fixing)
      - name: Lint (no auto-fix)
        run: pnpm --filter api lint:check

      - name: TypeScript type check
        run: pnpm --filter api exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter api test --ci --coverage

      - name: Build
        run: pnpm --filter api build

  # ── Frontend (Client) ─────────────────────────────
  client-build:
    name: Client — Lint, Types & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter client lint

      - name: TypeScript type check
        run: pnpm --filter client exec tsc --noEmit

      - name: Build Next.js
        run: pnpm --filter client build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3200/api

