name: CI — LMS Platform

on:
  push:
    branches: [main, develop, fix/remediation]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Backend (API) ──────────────────────────────────
  api-test:
    name: API — Lint, Types, Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # F7.1: Lint without --fix (fails on violations instead of silently fixing)
      - name: Lint (no auto-fix)
        run: npm run lint:check

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

  # ── Frontend (Client) ─────────────────────────────
  client-build:
    name: Client — Types & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: apps/client/package-lock.json

      - name: Install dependencies
        run: npm ci

      # F7.4: Client typecheck gate
      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3200/api
