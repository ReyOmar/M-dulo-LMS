# ══════════════════════════════════════════════════════════
# LMS PESV Education — Docker Compose (Production)
# ══════════════════════════════════════════════════════════
# Usage:
#   cp .env.production.example .env
#   # Edit .env with your production values
#   docker compose -f docker-compose.production.yml up -d --build
# ══════════════════════════════════════════════════════════

services:
  # ── MariaDB Database ──────────────────────────────────
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-lms_root_change_me}
      MYSQL_DATABASE: lms_db
      MYSQL_USER: ${DB_USER:-lms_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-lms_pass_change_me}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms-network

  # ── API (NestJS + Fastify) ────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: mysql://${DB_USER:-lms_user}:${DB_PASSWORD:-lms_pass_change_me}@db:3306/lms_db
      JWT_SECRET: ${JWT_SECRET}
      APP_PORT: 3200
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      APP_URL: ${APP_URL:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Campus Virtual}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-lms-uploads}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
    volumes:
      - api_uploads:/app/uploads
    ports:
      - "3200:3200"
    networks:
      - lms-network

  # ── Client (Next.js) ──────────────────────────────────
  client:
    build:
      context: ./apps/client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3200/api}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:3000"
    networks:
      - lms-network

  # ── Nginx Reverse Proxy ───────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
      - client
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - lms-network

volumes:
  db_data:
  api_uploads:

networks:
  lms-network:
    driver: bridge
